<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Аркаим — Колесница времени</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #2a2418;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 20px;
        }
        .book-container {
            max-width: 1300px;
            width: 100%;
            background: #fef7e0;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            border: 1px solid #c2a15b;
        }
        .pages-3d {
            position: relative;
            min-height: 60vh;
        }
        .page-3d {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: #fef7e0;
            display: flex;
            gap: 24px;
            align-items: stretch;
            backface-visibility: hidden;
            transform-origin: left center;
            transition: transform 0.5s ease;
            flex-wrap: wrap;
        }
        .page-3d.hidden-page {
            transform: rotateY(-150deg) scaleX(0.9);
            pointer-events: none;
            opacity: 0;
        }
        .page-3d.active-page {
            transform: rotateY(0deg);
            pointer-events: auto;
            opacity: 1;
            position: relative;
        }
        .card-col, .text-col {
            flex: 1;
            min-width: 250px;
        }
        .card-col img, .text-col img {
            width: 100%;
            border-radius: 16px;
            object-fit: contain;
            max-height: 50vh;
        }
        .track-area {
            margin-top: 30px;
            padding: 10px 0;
            position: relative;
        }
        .track-bg {
            background: #5e3e1f;
            height: 6px;
            border-radius: 3px;
            position: relative;
            margin: 0 10px;
        }
        .track-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: #eebb55;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .track-prints {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            padding: 0 10px;
        }
        .print {
            width: 8px;
            height: 8px;
            background: #c2a15b;
            border-radius: 50%;
            opacity: 0.4;
        }
        .print.active {
            background: #f5c542;
            opacity: 1;
        }
        .chariot {
            position: absolute;
            bottom: -24px;
            left: 0;
            transform: translateX(-50%);
            width: 320px;
            height: 120px;
            cursor: pointer;
            transition: left 0.4s ease-out;
            z-index: 30;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
        }
        .under-card-text {
            margin-top: 20px;
            padding: 12px;
            background: #efe3cc;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #2c2418;
            border-left: 4px solid #c2a15b;
            font-style: italic;
            width: 100%;
        }
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 15px 0 5px;
        }
        .speak-btn {
            background: #6b4c2c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin: 20px 0 10px;
            gap: 15px;
        }
        button {
            background: #6b4c2c;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled { opacity: 0.4; }
        .page-counter {
            background: #e2d5bd;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: bold;
        }
        .info {
            text-align: center;
            color: #c8b28b;
            font-size: 0.75rem;
            margin-top: 10px;
        }
        .copyright {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 15px;
            color: #8b6946;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
    </style>
</head>
<body>
<div class="book-container">
    <div class="pages-3d" id="pagesContainer"></div>

    <div class="track-area">
        <div class="track-bg">
            <div class="track-fill" id="trackFill"></div>
            <div class="chariot" id="chariot">
                <svg viewBox="0 0 550 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(110, 140)">
                        <circle cx="0" cy="0" r="28" stroke="#6b4c2c" stroke-width="6" fill="#3a2a1a"/>
                        <circle cx="0" cy="0" r="22" stroke="#aa7c4a" stroke-width="2" fill="none"/>
                        <circle cx="0" cy="0" r="7" fill="#c2a15b"/>
                        <line x1="0" y1="-22" x2="0" y2="22" stroke="#aa7c4a" stroke-width="3"/>
                        <line x1="-22" y1="0" x2="22" y2="0" stroke="#aa7c4a" stroke-width="3"/>
                        <line x1="-16" y1="-16" x2="16" y2="16" stroke="#aa7c4a" stroke-width="3"/>
                        <line x1="16" y1="-16" x2="-16" y2="16" stroke="#aa7c4a" stroke-width="3"/>
                    </g>
                    <g transform="translate(330, 140)">
                        <circle cx="0" cy="0" r="28" stroke="#6b4c2c" stroke-width="6" fill="#3a2a1a"/>
                        <circle cx="0" cy="0" r="22" stroke="#aa7c4a" stroke-width="2" fill="none"/>
                        <circle cx="0" cy="0" r="7" fill="#c2a15b"/>
                        <line x1="0" y1="-22" x2="0" y2="22" stroke="#aa7c4a" stroke-width="3"/>
                        <line x1="-22" y1="0" x2="22" y2="0" stroke="#aa7c4a" stroke-width="3"/>
                        <line x1="-16" y1="-16" x2="16" y2="16" stroke="#aa7c4a" stroke-width="3"/>
                        <line x1="16" y1="-16" x2="-16" y2="16" stroke="#aa7c4a" stroke-width="3"/>
                    </g>
                    <line x1="110" y1="120" x2="330" y2="120" stroke="#5a3e1f" stroke-width="8"/>
                    <rect x="140" y="65" width="190" height="45" rx="4" fill="#6b4c2c" stroke="#4a2e1a" stroke-width="2"/>
                    <rect x="145" y="60" width="180" height="8" fill="#7a5a3a"/>
                    <line x1="160" y1="65" x2="160" y2="40" stroke="#6b4c2c" stroke-width="7"/>
                    <line x1="310" y1="65" x2="310" y2="40" stroke="#6b4c2c" stroke-width="7"/>
                    <rect x="155" y="35" width="160" height="25" rx="3" fill="#8b5a2b"/>
                    <line x1="330" y1="75" x2="390" y2="60" stroke="#5a3e1f" stroke-width="7"/>
                    <g transform="translate(365, 10)">
                        <ellipse cx="28" cy="48" rx="24" ry="12" fill="#aa7c4a"/>
                        <ellipse cx="42" cy="32" rx="10" ry="9" fill="#aa7c4a"/>
                        <path d="M52 42 Q68 28 76 16" stroke="#aa7c4a" stroke-width="9" fill="none"/>
                        <ellipse cx="80" cy="14" rx="7" ry="5" fill="#aa7c4a"/>
                        <polygon points="86,11 92,9 88,16" fill="#aa7c4a"/>
                        <rect x="12" y="56" width="8" height="28" fill="#aa7c4a" rx="2"/>
                        <rect x="26" y="56" width="8" height="28" fill="#aa7c4a" rx="2"/>
                        <rect x="40" y="56" width="8" height="28" fill="#aa7c4a" rx="2"/>
                        <rect x="50" y="56" width="8" height="28" fill="#aa7c4a" rx="2"/>
                    </g>
                    <g transform="translate(415, 10)">
                        <ellipse cx="28" cy="48" rx="24" ry="12" fill="#aa7c4a"/>
                        <ellipse cx="42" cy="32" rx="10" ry="9" fill="#aa7c4a"/>
                        <path d="M52 42 Q68 28 76 16" stroke="#aa7c4a" stroke-width="9" fill="none"/>
                        <ellipse cx="80" cy="14" rx="7" ry="5" fill="#aa7c4a"/>
                        <polygon points="86,11 92,9 88,16" fill="#aa7c4a"/>
                        <rect x="12" y="56" width="8" height="28" fill="#aa7c4a" rx="2"/>
                        <rect x="26" y="56" width="8" height="28" fill="#aa7c4a" rx="2"/>
                        <rect x="40" y="56" width="8" height="28" fill="#aa7c4a" rx="2"/>
                        <rect x="50" y="56" width="8" height="28" fill="#aa7c4a" rx="2"/>
                    </g>
                    <line x1="430" y1="55" x2="390" y2="60" stroke="#c2a15b" stroke-width="2.5"/>
                    <line x1="390" y1="60" x2="330" y2="68" stroke="#c2a15b" stroke-width="2.5"/>
                </svg>
            </div>
        </div>
        <div class="track-prints" id="trackPrints"></div>
    </div>

    <div class="controls">
        <button id="playAutoBtn" class="speak-btn">▶ Озвучить и листать</button>
        <button id="stopAutoBtn" class="speak-btn">⏹ Остановить</button>
    </div>

    <div class="nav-buttons">
        <button id="prevBtn" disabled>◀ Назад</button>
        <span class="page-counter" id="pageCounter">1 / 0</span>
        <button id="nextBtn">Вперёд ▶</button>
    </div>
    <div class="info">🐎 Авто-листание под стих</div>
    <div class="copyright">© Лунева Анастасия Андреевна, СА‑218/б — Аркаим</div>
</div>

<script>
    const poemLinesByCard = [
        "Давай, мой друг, поговорим<br>О тайных смыслах бытия.",
        "Я расскажу про Аркаим,<br>А ты про красного коня.",
        "Когда копаемся в себе,<br>Мы тяготеем к небесам,",
        "К своей собственной судьбе<br>С пренебреженьем к чудесам.",
        "Давай, мой друг, поговорим<br>О том, что все мы потеряли.",
        "Порой не зная, что творим,<br>Мы всё в пути доупраздняли.",
        "Но как-то всё пошло не так,<br>Как изначально полагалось.",
        "Что жизнь не стоит и пятак,<br>А как красиво излагалось!",
        "Давай, мой друг, поговорим<br>О тайных промыслах Того,",
        "Кто так ко мне благоволил<br>В создание эго моего.",
        "Он предоставил всем и мне<br>Возможность смело говорить,",
        "Покуда находясь в седле,<br>Я всё ещё могу творить.",
        "Давай, мой друг, поговорим,<br>Ему на звёзды указал,",
        "Кем этот мир наш сотворим<br>И кто всё это заказал.",
        "Быть может, всё-таки поймём…<br>Ну что же ты опять молчишь?",
        "Давай подумаем вдвоём —<br>Да ты, приятель, просто спишь!",
        "Мы лежали с приятелем на берегу водоёма<br>после удачной рыбалки и вкусной ухи",
        "и разглядывали звёзды на небе.<br>Действительно произошёл такой диалог",
        "с самим собой.<br><em>© Автор стиха</em>"
    ];
    const total = 19;
    const durationSec = 181;
    const secPerPage = durationSec / total;
    const cardDurations = Array(total).fill(secPerPage);
    const fileNames = Array.from({length: total}, (_, i) => [`${i+1}.jpg`, `${i+1}.1.jpg`]).flat();
    const pages = [];
    for (let i = 0; i < fileNames.length; i += 2) pages.push([fileNames[i], fileNames[i+1]]);
    let current = 0;
    let autoTimer = null;
    let isAutoPlaying = false;
    const audio = new Audio('img/arkaim_poem.mp3');
    const container = document.getElementById('pagesContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const counter = document.getElementById('pageCounter');
    const trackFill = document.getElementById('trackFill');
    const trackPrints = document.getElementById('trackPrints');
    const chariot = document.getElementById('chariot');
    const playAutoBtn = document.getElementById('playAutoBtn');
    const stopAutoBtn = document.getElementById('stopAutoBtn');

    function buildPages() {
        container.innerHTML = '';
        pages.forEach((pair, idx) => {
            const div = document.createElement('div');
            div.className = 'page-3d';
            div.id = `page_${idx}`;
            if (idx !== 0) div.classList.add('hidden-page');
            div.innerHTML = `
                <div class="card-col"><img src="img/${pair[0]}" alt="Картинка"></div>
                <div class="text-col">${pair[1] ? `<img src="img/${pair[1]}" alt="Текст">` : ''}</div>
                <div class="under-card-text">${poemLinesByCard[idx] || ''}</div>
            `;
            container.appendChild(div);
        });
    }

    function updateUI() {
        document.querySelectorAll('.page-3d').forEach((p, i) => {
            p.classList.toggle('active-page', i === current);
            p.classList.toggle('hidden-page', i !== current);
        });
        prevBtn.disabled = current === 0;
        nextBtn.disabled = current === total-1;
        counter.innerText = `${current+1} / ${total}`;
        const percent = (current / (total-1)) * 100;
        trackFill.style.width = percent + '%';
        trackPrints.innerHTML = '';
        for (let i = 0; i < total; i++) {
            const dot = document.createElement('div');
            dot.className = 'print' + (i <= current ? ' active' : '');
            trackPrints.appendChild(dot);
        }
        const track = document.querySelector('.track-bg');
        if (track) chariot.style.left = (percent/100 * track.offsetWidth) + 'px';
    }

    function startAutoPlay() {
        if (isAutoPlaying) return;
        isAutoPlaying = true;
        current = 0;
        updateUI();
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Автоплей заблокирован:", e));
        let pageIndex = 0;
        autoTimer = setInterval(() => {
            if (pageIndex < total-1) {
                pageIndex++;
                current = pageIndex;
                updateUI();
            } else {
                stopAutoPlay();
            }
        }, cardDurations[pageIndex] * 1000);
    }

    function stopAutoPlay() {
        if (autoTimer) clearInterval(autoTimer);
        isAutoPlaying = false;
        audio.pause();
        audio.currentTime = 0;
    }

    function nextPage() { if (!isAutoPlaying && current < total-1) { current++; updateUI(); } }
    function prevPage() { if (!isAutoPlaying && current > 0) { current--; updateUI(); } }

    playAutoBtn.addEventListener('click', startAutoPlay);
    stopAutoBtn.addEventListener('click', stopAutoPlay);
    chariot.addEventListener('click', nextPage);
    prevBtn.onclick = prevPage;
    nextBtn.onclick = nextPage;
    window.onkeydown = (e) => { if (e.key === 'ArrowRight') { e.preventDefault(); nextPage(); } if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); } };

    buildPages();
    updateUI();
</script>
</body>
</html>
